# SKI — Sephirotische Kernintelligenz
# Docker Compose — All VM containers
# Run: docker compose up -d
# Verify: ./scripts/verify_all.sh

version: "3.8"

services:
  # ── DeerFlow Super-Agent ──

  deerflow-langgraph:
    image: deerflow-langgraph:latest
    container_name: ski-deerflow-langgraph
    ports:
      - "2024:2024"
    environment:
      - LM_STUDIO_BASE_URL=${SKI_LM_STUDIO_BASE_URL:-http://192.168.178.90:1234/v1}
      - WORKERS=10
    volumes:
      - /mnt/28bots_core/Obsidian_Vault:/mnt/ski-vault:rw
    mem_limit: 2g
    restart: unless-stopped
    networks:
      - deer-flow

  deerflow-gateway:
    image: deerflow-gateway:latest
    container_name: ski-deerflow-gateway
    ports:
      - "8001:8001"
    environment:
      - LM_STUDIO_BASE_URL=${SKI_LM_STUDIO_BASE_URL:-http://192.168.178.90:1234/v1}
    mem_limit: 512m
    restart: unless-stopped
    networks:
      - deer-flow

  deerflow-frontend:
    image: deerflow-frontend:latest
    container_name: ski-deerflow-frontend
    ports:
      - "3100:3000"  # Remapped from 3000 to 3100 to avoid conflict with OpenClaw
    mem_limit: 512m
    restart: unless-stopped
    networks:
      - deer-flow

  deerflow-nginx:
    image: nginx:alpine
    container_name: ski-deerflow-nginx
    ports:
      - "2026:2026"
    volumes:
      - ./config/nginx/deerflow.conf:/etc/nginx/conf.d/default.conf:ro
    mem_limit: 256m
    restart: unless-stopped
    depends_on:
      - deerflow-langgraph
      - deerflow-frontend
      - deerflow-gateway
    networks:
      - deer-flow

  # ── OpenClaw — Telegram Bot + Tool Gateway ──

  openclaw:
    image: node:22
    container_name: ski-openclaw
    ports:
      - "3000:3000"
    environment:
      - TELEGRAM_BOT_TOKEN=${SKI_TELEGRAM_BOT_TOKEN}
      - LM_STUDIO_BASE_URL=${SKI_LM_STUDIO_BASE_URL:-http://192.168.178.90:1234/v1}
    volumes:
      - /mnt/28bots_core/Obsidian_Vault:/mnt/ski-vault:rw
    mem_limit: 512m
    restart: unless-stopped
    networks:
      - deer-flow

  # ── Hermes Orchestrator (v0.7.0) ──

  hermes:
    image: ubuntu:22.04
    container_name: ski-hermes
    ports:
      - "9377:9377"  # Camofox anti-detection browser (new in v0.7)
    environment:
      - HERMES_DEFAULT_PROFILE=${SKI_HERMES_DEFAULT_PROFILE:-tiferet-beta}
      - LM_STUDIO_BASE_URL=${SKI_LM_STUDIO_BASE_URL:-http://192.168.178.90:1234/v1}
      - HERMES_MEMORY_PROVIDER=${SKI_HERMES_MEMORY_PROVIDER:-built-in}
      - HERMES_MILVUS_HOST=ski-milvus
      - HERMES_MILVUS_PORT=19530
      - CAMOFOX_PORT=9377
    volumes:
      - /mnt/28bots_core/Obsidian_Vault:/mnt/ski-vault:rw
      - hermes-data:/var/lib/hermes
    mem_limit: 1536m
    restart: unless-stopped
    networks:
      - deer-flow

  # ── Agent Zero — Task Hierarchy ──

  agent-zero:
    image: frdel/agent-zero:latest
    container_name: ski-agent-zero
    ports:
      - "8080:8080"
    environment:
      - LM_STUDIO_BASE_URL=${SKI_LM_STUDIO_BASE_URL:-http://192.168.178.90:1234/v1}
    volumes:
      - /mnt/28bots_core/Obsidian_Vault:/mnt/ski-vault:rw
    mem_limit: 1g
    restart: unless-stopped
    networks:
      - deer-flow

  # ── Auto Research Monitor ──
  # Watches experiment results from the vault and provides a simple dashboard
  # The actual Auto Research loop runs on the HOST (needs GPU)

  autoresearch-monitor:
    image: python:3.12-slim
    container_name: ski-autoresearch-monitor
    volumes:
      - /mnt/28bots_core/Obsidian_Vault:/mnt/ski-vault:ro
    environment:
      - SKI_HOST_IP=${SKI_HOST_IP:-192.168.178.90}
      - SKI_LM_STUDIO_BASE_URL=${SKI_LM_STUDIO_BASE_URL:-http://192.168.178.90:1234/v1}
    mem_limit: 256m
    restart: unless-stopped
    networks:
      - deer-flow
    command: >
      python -c "
      import json, time, os;
      results = '/mnt/ski-vault/SKI_Cookbook/M12_AutoResearch/results.jsonl';
      print('[monitor] Watching Auto Research results...');
      last = 0;
      while True:
          try:
              if os.path.exists(results):
                  with open(results) as f:
                      lines = f.readlines();
                  if len(lines) > last:
                      for line in lines[last:]:
                          exp = json.loads(line);
                          s = 'KEPT' if exp.get('kept') else 'REVERTED';
                          print(f'[exp {exp.get(\"id\",\"?\")}] {exp.get(\"description\",\"?\")[:60]} | val_bpb={exp.get(\"val_bpb\",\"N/A\")} | {s}');
                      last = len(lines);
          except Exception as e:
              print(f'[monitor] Error: {e}');
          time.sleep(30);
      "

  # ── Milvus Vector Database ──

  milvus:
    image: milvusdb/milvus:latest
    container_name: ski-milvus
    ports:
      - "19530:19530"
    volumes:
      - milvus-data:/var/lib/milvus
    mem_limit: 2g
    restart: unless-stopped
    networks:
      - deer-flow

# ── Networks ──

networks:
  deer-flow:
    driver: bridge
    name: docker_deer-flow

# ── Volumes ──

volumes:
  hermes-data:
  milvus-data:

# ── Resource Notes ──
# Total memory allocated: ~8.5 GB
#   deerflow-langgraph:  2.0 GB
#   deerflow-gateway:    0.5 GB
#   deerflow-frontend:   0.5 GB
#   deerflow-nginx:      0.25 GB
#   openclaw:            0.5 GB
#   hermes:              1.5 GB  (increased for v0.7 Camofox + memory plugins)
#   agent-zero:          1.0 GB
#   autoresearch-mon:    0.25 GB
#   milvus:              2.0 GB
#
# With 9GB VM RAM, ~0.5 GB remains for the OS. INSUFFICIENT.
# RECOMMENDATION: Increase VM RAM to 16GB in Hyper-V settings.
#
# Hermes v0.7 new port: 9377 (Camofox anti-detection browser)
