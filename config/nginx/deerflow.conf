# config/nginx/deerflow.conf

server {
    listen 2026;
    server_name localhost;

    # Hauptroute: DeerFlow Frontend
    location / {
        proxy_pass http://ski-deerflow-frontend:3100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Agent Zero Orchestrator Route
    location /agent-zero/ {
        proxy_pass http://ski-agent-zero:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Gateway API Route
    location /api/gateway/ {
        proxy_pass http://ski-deerflow-gateway:8001/;
        proxy_set_header Host $host;
    }
}
