# ═══════════════════════════════════════════════════════════════
# SKI — docker-compose.yml — Sephirotische Kernintelligenz
#
# Topologie: Target State Topology (TST)
# Architektur: Agent-Zero, Hermes-Agent, OpenClaw, OpenClaw-2
#
# Identitaets-Prinzip: Diese Datei liegt im Windows-Vault
# (D:\28Bots_Core\runtime) und wird von der VM
# direkt ueber /mnt/28bots_core/runtime ausgefuehrt.
#
# Start:  docker compose up -d
# Status: docker compose ps
# Logs:   docker compose logs -f
# ═══════════════════════════════════════════════════════════════

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # --- Hermes Agent (Reasoning & 3x3 Profile Matrix) ---
  # Zuerst deklariert, weil Agent-Zero und OpenClaw davon abhaengen.
  hermes-agent:
    build:
      context: ./agents/hermes-agent
    container_name: ski-hermes-agent
    ports:
      - "9377:9377"
    env_file: .env
    volumes:
      # Obsidian Vault Mount — Sessions & Memory direkt im Host-Vault
      - /mnt/28bots_core/hermes:/app/vault
      # Legacy-Pfade fuer Ruecklaufkompatibilitaet (optional, falls noch benutzt)
      - ./hermes/memory:/app/memory
      - ./hermes/data:/app/data
    restart: unless-stopped
    stop_grace_period: 10s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9377/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging
    networks:
      - ski-net

  # --- Agent Zero (Orchestrator & Task Runner) ---
  agent-zero:
    build:
      context: ./agents/agent-zero
    container_name: ski-agent-zero
    ports:
      - "8080:80"
    env_file: .env
    volumes:
      - ./agent-zero/workspace:/app/workspace
      - ./agent-zero/config:/app/config
    depends_on:
      hermes-agent:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging
    networks:
      - ski-net

  # --- OpenClaw (Telegram Bot 1) ---
  openclaw:
    build:
      context: ./openclaw
    container_name: ski-openclaw
    ports:
      - "3000:3000"
    env_file: .env
    volumes:
      - ./openclaw/data:/app/data
    depends_on:
      hermes-agent:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging
    networks:
      - ski-net

  # --- OpenClaw-2 (Telegram Bot 2 — separate Umgebung) ---
  openclaw-2:
    build:
      context: ./openclaw-2
    container_name: ski-openclaw-2
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      - PORT=3001
    volumes:
      - ./openclaw-2/data:/app/data
    depends_on:
      hermes-agent:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging
    networks:
      - ski-net

networks:
  ski-net:
    driver: bridge
